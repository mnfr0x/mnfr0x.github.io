	<script src="../assest/js/script.js"></script>
	<script>
		
		var imgElement = document.querySelector('img');
		const body = document.body;

		function toggle() {
			body.classList.toggle('dark');

			const isDarkMode = body.classList.contains('dark');

			if (isDarkMode) {
				imgElement.src = './assest/img/logo/light.png';
			} else {
				imgElement.src = './assest/img/logo/dark.png';
			}

			const expirationTime = new Date().getTime() + 10 * 1000; // or 86,400,000 milliseconds AND 12h = 12 * 60 * 60 * 1000
			localStorage.setItem('mode', JSON.stringify({ darkMode: isDarkMode, imgSrc: imgElement.src, expires: expirationTime }));
			
		}

		document.addEventListener('DOMContentLoaded', () => {
		
			check();

			}
		);

		window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {

			check();

			}
		);

		function check() {

			const storedData = localStorage.getItem('mode');

			if (storedData) {

				const { darkMode, imgSrc, expires } = JSON.parse(storedData);
				
				const currentTime = new Date().getTime();

				if (expires > currentTime) {

					document.body.classList.toggle('dark', darkMode);

					imgElement.src = imgSrc;

				} else {

					localStorage.removeItem('mode');
					auto();

				}
			} else {

				auto();

			}
		}

		function auto() {

			var prefersDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

			if (prefersDarkMode) {

				imgElement.src = './assest/img/logo/light.png';
				body.classList.add('dark');

			} else {

				imgElement.src = './assest/img/logo/dark.png';
				body.classList.remove('dark');

			}

		}
	</script>
